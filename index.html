<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8-3</title>

<style>

body{
margin:0;
padding:0;
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecb,#ffc0cb);
overflow:hidden;
}

/* chữ chính */
h1{
margin-top:80px;
font-size:45px;
color:white;
animation:zoom 2s infinite alternate;
}

p{
font-size:22px;
color:white;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* bó hoa */
.flower{
width:220px;
margin-top:30px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

/* tim bay */
.heart{
position:absolute;
font-size:25px;
top:-10%;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}

</style>
</head>

<body>

<h1>🌸 Chúc bà cô dì chị em 8-3 vui vẻ 🌸</h1>
<p>Luôn xinh đẹp, hạnh phúc và nhiều niềm vui 💖</p>

<img class="flower" src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
<!-- Nhạc cute -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c2e5e2b2e.mp3?filename=cute-love-14568.mp3" type="audio/mpeg">
</audio>

<script>

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
